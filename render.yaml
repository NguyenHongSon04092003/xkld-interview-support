services:
  - type: web
    name: xkld-backend
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: xkld-postgres
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: FRONTEND_URL
        sync: false
      - key: ENABLE_API_DOCS
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: PHOBERT_ENABLED
        value: "false"
      - key: VIETNAMESE_TOKENIZER_ENABLED
        value: "false"
      - key: PHOBERT_SERVICE_URL
        sync: false
      - key: PHOBERT_SERVICE_TIMEOUT
        value: "60"

databases:
  - name: xkld-postgres
    plan: starter
